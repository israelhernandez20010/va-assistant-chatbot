<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VA Assistant</title>
<link rel="stylesheet" href="style_premium.css">
</head>
<body>
<div class="chatbox">
<h2>🤖 VA Assistant</h2>

<div id="chat"></div>

<div id="typing" style="display:none;">Assistant is typing...</div>

<div class="suggestions">
<button onclick="quickAsk('What skills do you have?')">💼 Skills</button>
<button onclick="quickAsk('What tools do you use?')">🛠 Tools</button>
<button onclick="quickAsk('How much experience do you have?')">⭐ Experience</button>
</div>

<div class="input-area">
<input id="userInput" type="text" placeholder="Ask me anything..." autocomplete="off">
<button id="sendBtn">Send</button>
</div>

</div>
<script src="script.js"></script>
<script>
document.getElementById("userInput").addEventListener("keydown",e=>{
if(e.key==="Enter")document.getElementById("sendBtn").click();
});
</script>
</body>
</html>
